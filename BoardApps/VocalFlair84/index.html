<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Flair 84</title>
</head>
<body>
    <aac-board></aac-board>
    <div class = "loader-container">
        <div>Loading</div>
        <div class="loader"></div>
    </div>
</body>

<script type = "module">
    import { setup } from "../../index.js";
    setup("../../BoardFiles/VocalFlair84.obz");
</script>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #7b766f;
    }
    aac-board {
        width: 100vw;
        height: 100vh;
        display: block;
    }

    body[loaded] .loader-container {
        display: none;
    }

    body:not([loaded]) aac-board {
        display: none;
    }

    .loader-container {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        color: white;
        font-size: 1.5rem;
        font-weight: bold;
        letter-spacing: 0.2em;
    }

    .loader {
        width: 25vw;
        height: 3vw;
        border-radius: 20px;
        background:
        repeating-linear-gradient(135deg,#f03355 0 1vw,#ffa516 0 2vw) 0/0%   no-repeat,
        repeating-linear-gradient(135deg,#ddd    0 1vw,#eee    0 2vw) 0/100%;
        animation: l3 2s infinite;
        background-size: calc(var(--p, 0) * 100%) 100%, 100%;
    }

</style>
</html>
